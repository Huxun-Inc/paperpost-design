<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="280" viewBox="0 0 800 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FrontPost text logo with sparkle on white</title>
  <desc id="desc">The word FrontPost in deep sea teal with a small sparkle star near the upper right of the text.</desc>
  <defs>
    <style>
