<?xml version="1.0" encoding="UTF-8"?>
<!--
  FrontPost / 前沿邮报 logo geometry reference.
  This is an engineering/reference SVG, not the final trademark master artwork.
  Final commercial logo should be approved in Figma/brand asset workflow.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FrontPost four-point star reference mark</title>
  <desc id="desc">A clean FrontPost four-point frontier star mark on a paper-white rounded tile.</desc>
  <defs>
    <style>
      :root {
        --paper: #ffffff;
        --ink: #1f3238;
        --teal: #264653;
      }
      .tile { fill: var(--paper); }
      .mark { fill: var(--teal); }
    </style>
  </defs>

  <rect class="tile" x="0" y="0" width="1024" height="1024" rx="256"/>

  <!--
    Star geometry:
    Center: 512,512
    Outer vertical radius: 344 (approx. 5.38/8 total mark height)
    Outer horizontal radius: 344
    Core diagonal control radius: 70
    Primary axes: 0, 90, 180, 270 degrees.
    Edge slopes approximate 38-42 degrees relative to the horizontal axes.
  -->
  <path
    id="frontpost-star"
    class="mark"
    d="
      M512 168
      C535 348 574 450 856 512
      C574 574 535 676 512 856
      C489 676 450 574 168 512
      C450 450 489 348 512 168
      Z
    "
  />
</svg>
